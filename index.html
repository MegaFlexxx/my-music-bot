<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Sound</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .search-input {
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        .search-input:focus {
            border-color: #ff6b6b;
            background: rgba(255,255,255,0.08);
        }
        .search-input::placeholder {
            color: #555;
        }
        .search-btn {
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-btn:hover {
            transform: scale(1.02);
        }
        .hint {
            color: #555;
            font-size: 14px;
            margin-top: 20px;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #888;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success { color: #4ade80; background: rgba(74, 222, 128, 0.1); }
        .status.error { color: #f87171; background: rgba(248, 113, 113, 0.1); }
        .status.loading { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .close-btn {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎵 Skibidi Sound</div>
        
        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                placeholder="🔍 Название трека..." 
                id="searchInput"
                autofocus
            >
            <button class="search-btn" id="searchBtn">🔍 Найти музыку</button>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="hint">💡 Бот найдёт трек в Яндекс.Музыке</div>
        
        <button class="close-btn" onclick="Telegram.WebApp.close()">✕ Закрыть</button>
    </div>

    <script>
        // --- ИНИЦИАЛИЗАЦИЯ ---
        const tg = Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const status = document.getElementById('status');
        
        function showStatus(text, type = '') {
            status.textContent = text;
            status.className = 'status show ' + type;
        }
        
        function searchTrack() {
            const query = searchInput.value.trim();
            if (!query) {
                showStatus('⚠️ Напиши название трека!', 'error');
                return;
            }
            
            showStatus('🔍 Ищу "' + query + '"...', 'loading');
            
            // ОТПРАВЛЯЕМ ДАННЫЕ НАПРЯМУЮ В БОТА (НЕ В ЧАТ!)
            tg.sendData(JSON.stringify({
                action: 'search',
                query: query
            }));
            
            showStatus('✅ Запрос отправлен в бот!', 'success');
            
            // Закрываем через 1.5 секунды
            setTimeout(() => {
                tg.close();
            }, 1500);
        }
        
        searchBtn.addEventListener('click', searchTrack);
        
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchTrack();
        });
        
        searchInput.focus();
        
        console.log('🎵 Skibidi Sound Player готов!');
    </script>
</body>
</html>
