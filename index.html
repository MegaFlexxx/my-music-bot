<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skibidi Sound</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 420px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .player-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
        }
        .album-art {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .track-info { text-align: center; margin-bottom: 20px; }
        .track-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .track-artist { color: #888; font-size: 16px; }
        .progress-container { margin: 16px 0; }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 16px 0;
        }
        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            transition: 0.2s;
            opacity: 0.7;
        }
        .control-btn:hover { opacity: 1; transform: scale(1.1); }
        .control-btn.play {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            opacity: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }
        .control-btn.play:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,107,107,0.3); }
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        .action-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.15); }
        .action-btn.download {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            cursor: pointer;
            border: none;
        }
        .action-btn.download:hover { transform: scale(1.02); }
        .playlist-section { margin-top: 20px; }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .playlist-title { font-size: 16px; font-weight: 600; color: #aaa; }
        .playlist-count { color: #666; font-size: 13px; }
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.2s;
            gap: 12px;
        }
        .track-item:hover { background: rgba(255,255,255,0.08); }
        .track-item.active {
            background: rgba(255,107,107,0.15);
            border-left: 3px solid #ff6b6b;
        }
        .track-number { color: #666; font-size: 13px; width: 24px; }
        .track-info-playlist { flex: 1; }
        .track-name { font-size: 14px; font-weight: 500; }
        .track-artist-small { font-size: 12px; color: #666; }
        .track-duration { font-size: 13px; color: #666; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus {
            border-color: #ff6b6b;
            background: rgba(255,255,255,0.08);
        }
        .search-input::placeholder { color: #555; }
        .search-btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-btn:hover { transform: scale(1.02); }
        .nav-bottom {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 12px;
        }
        .nav-item.active { color: #ff6b6b; }
        .nav-item .icon { font-size: 22px; }
        .nav-item:hover { color: #fff; }
        @media (max-width: 400px) {
            .album-art { width: 160px; height: 160px; font-size: 48px; }
            .controls { gap: 12px; }
            .control-btn { font-size: 22px; }
            .control-btn.play { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <div class="logo">🎵 Skibidi Sound</div>
            <button class="close-btn" onclick="Telegram.WebApp.close()">✕</button>
        </div>
        
        <div class="player-card">
            <div class="album-art" id="albumArt">🎵</div>
            <div class="track-info">
                <div class="track-title" id="trackTitle">Believer</div>
                <div class="track-artist" id="trackArtist">Imagine Dragons</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">3:24</span>
                </div>
            </div>
            <div class="controls">
                <button class="control-btn" id="shuffleBtn">🔀</button>
                <button class="control-btn" id="prevBtn">⏮</button>
                <button class="control-btn play" id="playBtn">▶️</button>
                <button class="control-btn" id="nextBtn">⏭</button>
                <button class="control-btn" id="repeatBtn">🔁</button>
            </div>
            <div class="actions">
                <button class="action-btn download" id="downloadBtn">📥 Скачать</button>
                <button class="action-btn" id="likeBtn">❤️</button>
                <button class="action-btn" id="addBtn">➕</button>
            </div>
        </div>
        
        <div class="playlist-section">
            <div class="playlist-header">
                <span class="playlist-title">📋 Текущий плейлист</span>
                <span class="playlist-count" id="trackCount">12 треков</span>
            </div>
            <div id="playlistContainer"></div>
        </div>
        
        <div class="search-box">
            <input type="text" class="search-input" placeholder="🔍 Найти трек..." id="searchInput">
            <button class="search-btn" id="searchBtn">Найти</button>
        </div>
        
        <div class="nav-bottom">
            <button class="nav-item active" id="navPlayer"><span class="icon">🎵</span>Плеер</button>
            <button class="nav-item" id="navPlaylists"><span class="icon">📋</span>Плейлисты</button>
            <button class="nav-item" id="navFavorites"><span class="icon">⭐</span>Избранное</button>
            <button class="nav-item" id="navProfile"><span class="icon">👤</span>Профиль</button>
        </div>
    </div>
    
    <script>
        // --- ПРОВЕРКА SDK ---
        if (typeof Telegram === 'undefined') {
            console.warn('Telegram SDK не загружен! Сайт открыт вне Telegram.');
        }
        
        // --- ИНИЦИАЛИЗАЦИЯ ---
        const tg = window.Telegram ? Telegram.WebApp : null;
        
        if (tg) {
            tg.expand();
            tg.ready();
            console.log('✅ Telegram Web App инициализирован!');
        } else {
            console.log('⚠️ Плеер работает в обычном браузере (не Telegram)');
        }
        
        // --- СОСТОЯНИЕ ---
        const state = {
            currentTrack: 0,
            isPlaying: false,
            tracks: [
                { title: 'Believer', artist: 'Imagine Dragons', duration: '3:24' },
                { title: 'Radioactive', artist: 'Imagine Dragons', duration: '3:06' },
                { title: 'Thunder', artist: 'Imagine Dragons', duration: '3:07' },
                { title: 'Demons', artist: 'Imagine Dragons', duration: '2:57' },
                { title: 'Enemy', artist: 'Imagine Dragons', duration: '2:53' },
                { title: 'Natural', artist: 'Imagine Dragons', duration: '3:09' },
                { title: 'Bones', artist: 'Imagine Dragons', duration: '2:45' },
                { title: 'Hear Me', artist: 'Imagine Dragons', duration: '3:53' },
                { title: 'It\'s Time', artist: 'Imagine Dragons', duration: '3:38' },
                { title: 'On Top of the World', artist: 'Imagine Dragons', duration: '3:12' },
                { title: 'Shots', artist: 'Imagine Dragons', duration: '3:52' },
                { title: 'Whatever It Takes', artist: 'Imagine Dragons', duration: '3:21' },
            ],
            progressInterval: null
        };
        
        // --- DOM ЭЛЕМЕНТЫ ---
        const albumArt = document.getElementById('albumArt');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const progressFill = document.getElementById('progressFill');
        const currentTime = document.getElementById('currentTime');
        const totalTime = document.getElementById('totalTime');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const playlistContainer = document.getElementById('playlistContainer');
        const trackCount = document.getElementById('trackCount');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const likeBtn = document.getElementById('likeBtn');
        const addBtn = document.getElementById('addBtn');
        
        // --- ФУНКЦИЯ ОТПРАВКИ В БОТ ---
        function sendToBot(data) {
            if (tg) {
                tg.sendData(JSON.stringify(data));
                console.log('📤 Отправлено в бот:', data);
            } else {
                console.log('📤 (имитация) Отправка в бот:', data);
            }
        }
        
        // --- ФУНКЦИЯ ПОКАЗА POPUP ---
        function showPopup(title, message) {
            if (tg) {
                tg.showPopup({
                    title: title,
                    message: message,
                    buttons: [{ type: 'ok' }]
                });
            } else {
                alert(title + '\n\n' + message);
            }
        }
        
        // --- ФУНКЦИЯ ЗАГРУЗКИ ТРЕКА ---
        function loadTrack(index) {
            const track = state.tracks[index];
            if (!track) return;
            
            state.currentTrack = index;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            totalTime.textContent = track.duration;
            
            progressFill.style.width = '0%';
            currentTime.textContent = '0:00';
            
            document.querySelectorAll('.track-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            
            sendToBot({
                action: 'load',
                track: track.title,
                artist: track.artist,
                index: index
            });
        }
        
        // --- ФУНКЦИЯ ВОСПРОИЗВЕДЕНИЯ ---
        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            playBtn.textContent = state.isPlaying ? '⏸️' : '▶️';
            
            sendToBot({ action: state.isPlaying ? 'play' : 'pause' });
            
            if (state.isPlaying) {
                if (state.progressInterval) clearInterval(state.progressInterval);
                
                let progress = parseFloat(progressFill.style.width) || 0;
                const totalSec = 204;
                
                state.progressInterval = setInterval(() => {
                    if (!state.isPlaying) {
                        clearInterval(state.progressInterval);
                        return;
                    }
                    
                    progress += 0.3;
                    if (progress >= 100) {
                        progress = 0;
                        clearInterval(state.progressInterval);
                        nextTrack();
                        return;
                    }
                    
                    progressFill.style.width = progress + '%';
                    
                    const currentSec = Math.floor((progress / 100) * totalSec);
                    const min = Math.floor(currentSec / 60);
                    const sec = currentSec % 60;
                    currentTime.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
                }, 200);
            } else {
                if (state.progressInterval) {
                    clearInterval(state.progressInterval);
                    state.progressInterval = null;
                }
            }
        }
        
        // --- СЛЕДУЮЩИЙ / ПРЕДЫДУЩИЙ ---
        function nextTrack() {
            const next = (state.currentTrack + 1) % state.tracks.length;
            loadTrack(next);
            if (state.isPlaying) {
                const wasPlaying = state.isPlaying;
                togglePlay();
                togglePlay();
            }
        }
        
        function prevTrack() {
            const prev = (state.currentTrack - 1 + state.tracks.length) % state.tracks.length;
            loadTrack(prev);
            if (state.isPlaying) {
                togglePlay();
                togglePlay();
            }
        }
        
        // --- ОТРИСОВКА ПЛЕЙЛИСТА ---
        function renderPlaylist(filter = '') {
            const filtered = filter
                ? state.tracks.filter(t => 
                    t.title.toLowerCase().includes(filter.toLowerCase()) ||
                    t.artist.toLowerCase().includes(filter.toLowerCase())
                  )
                : state.tracks;
            
            playlistContainer.innerHTML = '';
            
            if (filtered.length === 0) {
                playlistContainer.innerHTML = `
                    <div style="text-align:center;color:#555;padding:20px;">
                        🔍 Ничего не найдено
                    </div>
                `;
                trackCount.textContent = '0 треков';
                return;
            }
            
            filtered.forEach((track, i) => {
                const div = document.createElement('div');
                div.className = `track-item ${i === state.currentTrack ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="track-number">${i + 1}</span>
                    <div class="track-info-playlist">
                        <div class="track-name">${track.title}</div>
                        <div class="track-artist-small">${track.artist}</div>
                    </div>
                    <span class="track-duration">${track.duration}</span>
                `;
                div.addEventListener('click', () => {
                    const realIndex = state.tracks.indexOf(track);
                    loadTrack(realIndex);
                    if (state.isPlaying) {
                        togglePlay();
                        togglePlay();
                    }
                });
                playlistContainer.appendChild(div);
            });
            
            trackCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'трек' : 'треков'}`;
        }
        
        // ============================================================
        // ВСЕ ОБРАБОТЧИКИ СОБЫТИЙ
        // ============================================================
        
        // --- ВОСПРОИЗВЕДЕНИЕ ---
        playBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('▶️ Кнопка Play нажата!');
            togglePlay();
        });
        
        // --- СЛЕДУЮЩИЙ / ПРЕДЫДУЩИЙ ---
        nextBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('⏭ Кнопка Next нажата!');
            nextTrack();
        });
        
        prevBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('⏮ Кнопка Prev нажата!');
            prevTrack();
        });
        
        // --- ПЕРЕМЕШКА ---
        shuffleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('🔀 Кнопка Shuffle нажата!');
            shuffleBtn.style.transform = 'rotate(45deg)';
            shuffleBtn.style.opacity = shuffleBtn.style.opacity === '1' ? '0.7' : '1';
            sendToBot({ action: 'shuffle' });
        });
        
        // --- ПОВТОР ---
        repeatBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('🔁 Кнопка Repeat нажата!');
            repeatBtn.style.color = repeatBtn.style.color === '#ff6b6b' ? '#fff' : '#ff6b6b';
            sendToBot({ action: 'repeat' });
        });
        
        // --- СКАЧИВАНИЕ ---
        downloadBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const track = state.tracks[state.currentTrack];
            console.log(`📥 Скачать: ${track.title} — ${track.artist}`);
            sendToBot({
                action: 'download',
                track: track.title,
                artist: track.artist
            });
            showPopup('📥 Скачивание', `Трек "${track.title}" — ${track.artist} скоро будет отправлен!`);
        });
        
        // --- ЛАЙК ---
        likeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const track = state.tracks[state.currentTrack];
            likeBtn.textContent = likeBtn.textContent === '❤️' ? '❤️‍🔥' : '❤️';
            console.log(`❤️ Лайк: ${track.title}`);
            sendToBot({
                action: 'like',
                track: track.title
            });
            showPopup('❤️ Лайк!', `Ты лайкнул "${track.title}"!`);
        });
        
        // --- ДОБАВИТЬ В ПЛЕЙЛИСТ ---
        addBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const track = state.tracks[state.currentTrack];
            console.log(`➕ Добавить в плейлист: ${track.title}`);
            sendToBot({
                action: 'add_to_playlist',
                track: track.title
            });
            showPopup('➕ Добавлено', `Трек "${track.title}" добавлен в плейлист!`);
        });
        
        // --- ПОИСК (ОТПРАВЛЯЕТ В БОТА) ---
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const query = searchInput.value.trim();
            console.log(`🔍 Поиск: "${query}"`);
            if (query) {
                // Отправляем в бот через WebApp
                if (tg) {
                    tg.sendData(JSON.stringify({
                        action: 'search',
                        query: query
                    }));
                    showPopup('🔍 Поиск', `Ищу "${query}" в Яндекс.Музыке...\nРезультат придёт в чат!`);
                } else {
                    // Если не в Telegram
                    window.open(`https://t.me/skibidi_sound_bot?start=search_${encodeURIComponent(query)}`);
                }
                searchInput.value = '';
            } else {
                showPopup('⚠️', 'Напиши название трека или исполнителя!');
            }
        });
        
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchBtn.click();
            }
        });
        
        // --- НАВИГАЦИЯ ---
        document.getElementById('navPlayer').addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showPopup('🎵 Плеер', 'Ты на главном экране плеера!');
        });
        
        document.getElementById('navPlaylists').addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showPopup('📋 Плейлисты', 'Твои плейлисты будут здесь! Скоро добавлю! 🚀');
        });
        
        document.getElementById('navFavorites').addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showPopup('⭐ Избранное', 'Твои любимые треки будут здесь! ❤️');
        });
        
        document.getElementById('navProfile').addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            showPopup('👤 Профиль', 'Твоя статистика скоро появится! 📊');
        });
        
        // --- ЗАГРУЗКА ---
        loadTrack(0);
        renderPlaylist();
        
        console.log('🎵 Skibidi Sound Player полностью загружен!');
        console.log(`📊 Всего треков: ${state.tracks.length}`);
    </script>
</body>
</html>
